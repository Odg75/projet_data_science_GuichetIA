# Configuration de déploiement du backend GuichetIA sur Render.
# Documentation : https://render.com/docs/blueprint-spec
#
# Le build reconstruit l'index vectoriel à chaque déploiement (les PDFs
# sources sont versionnés dans backend/data/pdfs/). Les embeddings sont
# calculés via l'API d'inférence HuggingFace (HUGGINGFACEHUB_API_TOKEN),
# pas de modèle chargé en local : ça évite de dépasser les 512 Mo de RAM
# du plan gratuit.

services:
  - type: web
    name: guichetia-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: >
      pip install -r requirements.txt &&
      python ingestion/build_index.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: HUGGINGFACEHUB_API_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
